  <body>

    <!-- ══ AI SEO AUTO-INJECTOR ══
         Fetches fresh SEO from /api/seo and injects into page
         Updates meta tags, schema, keywords dynamically
    ══════════════════════════════ -->
    <script>
      (async function injectSEO() {
        try {
          const res = await fetch('/api/seo', { cache: 'force-cache' });
          if (!res.ok) return;
          const seo = await res.json();

          // Update title
          if (seo.title) {
            document.title = seo.title;
            document.getElementById('seo-title').textContent = seo.title;
          }

          // Update meta description
          if (seo.description) {
            document.getElementById('seo-desc').setAttribute('content', seo.description);
          }

          // Update keywords
          if (seo.keywords && seo.keywords.length) {
            document.getElementById('seo-keywords').setAttribute('content', seo.keywords.join(', '));
          }

          // Update OG tags
          if (seo.og_title) {
            document.getElementById('og-title').setAttribute('content', seo.og_title);
            document.getElementById('tw-title').setAttribute('content', seo.og_title);
          }
          if (seo.og_description) {
            document.getElementById('og-desc').setAttribute('content', seo.og_description);
            document.getElementById('tw-desc').setAttribute('content', seo.og_description);
          }

          // Update Schema JSON-LD
          if (seo.schema) {
            document.getElementById('schema-jsonld').textContent =
              JSON.stringify(seo.schema, null, 2);
          }

          // Log for debugging
          console.log('[SAHAYAK SEO] Injected:', seo.title, '| Source:', seo.source);

        } catch (e) {
          // Silent fail - default SEO still works
          console.log('[SAHAYAK SEO] Using default meta tags');
        }
      })();
    </script>
  </body>
