<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f39c12"/>
      <stop offset="50%" style="stop-color:#e74c3c"/>
      <stop offset="100%" style="stop-color:#8e44ad"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.3)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </linearGradient>
    <clipPath id="squircle">
      <path d="M50 2 C22 2 2 22 2 50 C2 78 22 98 50 98 C78 98 98 78 98 50 C98 22 78 2 50 2 Z"/>
    </clipPath>
  </defs>

  <!-- Instagram-style squircle background -->
  <path d="M50 2 C22 2 2 22 2 50 C2 78 22 98 50 98 C78 98 98 78 98 50 C98 22 78 2 50 2 Z" fill="url(#bg)"/>

  <!-- Shine overlay -->
  <path d="M50 2 C22 2 2 22 2 50 C2 78 22 98 50 98 C78 98 98 78 98 50 C98 22 78 2 50 2 Z" fill="url(#shine)"/>

  <!-- Tricolor strip at top -->
  <rect x="2" y="2" width="32" height="8" fill="#ff9900" rx="8" ry="0" clip-path="url(#squircle)"/>
  <rect x="34" y="2" width="32" height="8" fill="#ffffff" clip-path="url(#squircle)"/>
  <rect x="66" y="2" width="32" height="8" fill="#138808" rx="0" ry="8" clip-path="url(#squircle)"/>

  <!-- Headphone arc -->
  <path d="M25 50 C25 35 35 25 50 25 C65 25 75 35 75 50" fill="none" stroke="white" stroke-width="5" stroke-linecap="round"/>

  <!-- Left ear cup -->
  <rect x="19" y="48" width="10" height="14" rx="5" fill="white"/>

  <!-- Right ear cup -->
  <rect x="71" y="48" width="10" height="14" rx="5" fill="white"/>

  <!-- Turban -->
  <ellipse cx="50" cy="36" rx="13" ry="6" fill="#138808"/>
  <ellipse cx="50" cy="34" rx="10" ry="5" fill="#ff9900"/>
  <ellipse cx="50" cy="32" rx="7" ry="4" fill="white"/>

  <!-- Face circle -->
  <circle cx="50" cy="52" r="14" fill="#1a1a3e"/>

  <!-- Smile -->
  <path d="M43 55 Q50 62 57 55" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Eyes -->
  <circle cx="45" cy="50" r="2" fill="white"/>
  <circle cx="55" cy="50" r="2" fill="white"/>

  <!-- Mic dot -->
  <circle cx="50" cy="68" r="3" fill="#f39c12"/>

  <!-- "स" text -->
  <text x="50" y="90" font-family="serif" font-size="11" font-weight="900" fill="white" text-anchor="middle" opacity="0.9">सहायक</text>
</svg>
